<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Explorer</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            min-height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            color: #27313a;
            background: #eef1f4;
        }
        .header { background: #263646; color: white; padding: 1.25rem 1.5rem; line-height: 1.6; }
        .header h1 { font-size: 1.55rem; margin-bottom: 0.25rem; }
        .header p { color: #d7e0e7; }
        .nav {
            display: flex; flex-wrap: wrap; gap: 1rem; background: white;
            padding: 0.8rem 1.5rem; border-bottom: 1px solid #d7dde2;
        }
        .nav a { color: #286b9f; font-weight: 650; text-decoration: none; }
        .shell {
            display: grid; grid-template-columns: minmax(0, 1fr) 380px; gap: 1rem;
            min-height: calc(100vh - 134px); padding: 1rem;
        }
        .panel { background: white; border: 1px solid #d7dde2; border-radius: 8px; min-width: 0; }
        .toolbar {
            display: flex; flex-wrap: wrap; align-items: center; justify-content: space-between;
            gap: 0.75rem; padding: 0.75rem; border-bottom: 1px solid #d7dde2;
        }
        button {
            border: 1px solid #b8c3cc; border-radius: 6px; background: #f7f9fa; color: #24313d;
            cursor: pointer; font: inherit; font-weight: 650; min-height: 2.1rem; padding: 0.4rem 0.75rem;
        }
        button:hover { background: #e9eef2; }
        button.active { border-color: #2d6f9f; background: #2d6f9f; color: white; }
        button.primary { border-color: #27735f; background: #2d806a; color: white; }
        input[type="search"] {
            width: min(100%, 22rem); border: 1px solid #b8c3cc; border-radius: 6px;
            padding: 0.5rem 0.65rem; font: inherit;
        }
        .view { display: none; height: calc(100vh - 203px); min-height: 520px; overflow: auto; }
        .view.active { display: block; }

        /* Explorer tree */
        #tree { padding: 0.4rem 0.25rem; }
        .sel-box { margin: 0 0.35rem 0 0; cursor: pointer; }
        .backup-btn { margin-left: auto; }
        #backup-btn { margin-left: 0.4rem; }   /* sit beside Commit, not pushed away */
        .backup-btn:disabled { opacity: 0.5; cursor: default; }
        .backup-panel { padding: 0.6rem; }
        .backup-panel .row { margin: 0.3rem 0; }
        .backup-panel .warn { color: #b25b00; }
        .backup-panel progress { width: 100%; }
        .row {
            display: flex; align-items: center; gap: 0.5rem; padding: 0.35rem 0.5rem;
            border-radius: 6px; cursor: pointer; user-select: none;
        }
        .row:hover { background: #f1f5f8; }
        .row.selected { background: #e3eef6; outline: 1px solid #9cc1dd; }
        .row.dimmed { opacity: 0.32; }
        .twisty {
            flex: 0 0 1.1rem; text-align: center; color: #6a7884; font-size: 0.8rem;
            transition: transform 0.12s ease;
        }
        .twisty.spacer { visibility: hidden; }
        .row.open > .twisty { transform: rotate(90deg); }
        .dot { flex: 0 0 0.6rem; width: 0.6rem; height: 0.6rem; border-radius: 50%; }
        .row-label { font-weight: 600; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .row-id {
            font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
            color: #2b5878; font-weight: 700;
        }
        .row-meta { color: #6a7884; font-weight: 400; font-size: 0.85rem; }
        .badge {
            margin-left: auto; flex: 0 0 auto; background: #e5edf4; color: #2b5878;
            border-radius: 999px; font-size: 0.75rem; font-weight: 700; padding: 0.05rem 0.45rem;
        }
        .badge.warn { background: #f6e7c8; color: #8a6320; }
        .badge.muted { background: #eceff2; color: #6a7884; }
        .badge.derived { background: #ece3f6; color: #6b3fae; }
        .badge.curated { background: #f6ead8; color: #9a6516; }
        /* A committed (stamped) artifact: distinct from raw scanned files. */
        .row.artifact > .row-label { font-weight: 600; }
        .prov-status { font-weight: 700; }
        .prov-status.ok { color: #27735f; }
        .prov-status.modified { color: #8a6320; }
        .prov-status.missing { color: #8a3b3b; }
        .children { margin-left: 1.1rem; border-left: 1px solid #e6ebef; padding-left: 0.25rem; }
        .hidden { display: none; }
        .tag-chip {
            display: inline-block; border-radius: 999px; background: #e5edf4; color: #2b5878;
            font-size: 0.72rem; font-weight: 600; padding: 0.02rem 0.45rem; margin-left: 0.25rem;
        }
        .entry-icon { flex: 0 0 1rem; text-align: center; }

        /* Detail */
        .detail { padding: 1rem; overflow: auto; max-height: calc(100vh - 134px); }
        .detail h2 { font-size: 1.2rem; margin-bottom: 0.35rem; overflow-wrap: anywhere; }
        .detail-section { margin-top: 1rem; }
        .detail-section h3 { color: #53616d; font-size: 0.82rem; margin-bottom: 0.5rem; text-transform: uppercase; }
        .kv { display: grid; grid-template-columns: 8rem minmax(0, 1fr); gap: 0.35rem 0.6rem; font-size: 0.92rem; }
        .kv dt { color: #667582; font-weight: 650; }
        .kv dd { min-width: 0; overflow-wrap: anywhere; }
        .list { display: grid; gap: 0.5rem; }
        .list-item { border: 1px solid #d7dde2; border-radius: 6px; padding: 0.6rem; overflow-wrap: anywhere; }
        .list-item.stale { border-color: #e0c187; background: #fdf7ec; }
        .muted { color: #6a7884; }
        .empty { color: #6a7884; padding: 1rem; }
        .status { color: #53616d; font-size: 0.9rem; padding: 1rem; }
        a.xlink { color: #286b9f; font-weight: 650; text-decoration: none; }
        @media (max-width: 980px) {
            .shell { grid-template-columns: 1fr; }
            .view { height: 60vh; }
            .detail { max-height: none; }
        }
    </style>
</head>
<body>
    <script src="auth.js"></script>
    <header class="header">
        <div style="display: flex; align-items: center; gap: 0.8rem;">
            <svg width="34" height="34" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true"><rect x="12" y="8" width="40" height="48" rx="4" fill="#eef1f4"></rect><line x1="21" y1="8" x2="21" y2="56" stroke="#8aa0b3" stroke-width="1.6"></line><circle cx="16.5" cy="20" r="1.6" fill="#8aa0b3"></circle><circle cx="16.5" cy="32" r="1.6" fill="#8aa0b3"></circle><circle cx="16.5" cy="44" r="1.6" fill="#8aa0b3"></circle><line x1="27" y1="24" x2="46" y2="24" stroke="#42566b" stroke-width="2.4" stroke-linecap="round"></line><line x1="27" y1="32" x2="46" y2="32" stroke="#42566b" stroke-width="2.4" stroke-linecap="round"></line><line x1="27" y1="40" x2="40" y2="40" stroke="#42566b" stroke-width="2.4" stroke-linecap="round"></line></svg>
            <h1>Electronic Lab Notebook</h1>
        </div>
        <p style="margin-left: calc(34px + 0.8rem);">Data Explorer</p>
    </header>
    <nav class="nav">
        <a href="/">Data Explorer</a>
        <a href="experiments.html">Experiment Catalog</a>
        <a href="reports.html">Reports</a>
        <a href="protocols.html">Protocols</a>
        <a href="code.html">Code</a>
        <a href="documents.html">Documents</a>
        <a href="presentations.html">Presentations</a>
        <a href="posters.html">Posters</a>
    </nav>
    <main class="shell">
        <section class="panel">
            <div class="toolbar">
                <input id="search" type="search" placeholder="Search title or tags">
                <button id="commit-btn" class="backup-btn" disabled>Commit… (0)</button>
                <button id="backup-btn" class="backup-btn" disabled>Backup… (0)</button>
            </div>
            <div id="explorer-view" class="view active">
                <div id="tree"></div>
            </div>
        </section>
        <aside class="panel detail" id="detail">
            <p class="empty">Select an experiment, repetition, or file.</p>
        </aside>
    </main>
    <script>
        const API = '/api/sdgl';
        // Static-bundle mode: the export injects `window.SDGL_STATIC = true` and an
        // inline `window.SDGL_DATA` snapshot into this page's <head>. In that mode we
        // read the embedded snapshot instead of the live API and hide every mutating
        // control (selection/backup, Open-in-OS) — there is no server to talk to.
        // The data is embedded (not fetched) so the bundle works opened from disk
        // (`file://`), where the browser blocks fetch() of sibling files.
        const STATIC = window.SDGL_STATIC === true;
        const TYPE_COLORS = {
            experiment: '#2d6f9f', protocol: '#7f5f2f', report: '#5d7290',
            presentation: '#8a6db1', dir: '#6b7b35', file: '#9aa6b0',
            aggregate_analysis: '#2f8f7f', dataset: '#7a4fb0'
        };

        let treeData = {experiments: []};
        let selectedKey = null;

        const selected = new Set();            // keys: `${node_id} ${rel_path}`
        const selKey = (nodeId, rel) => `${nodeId} ${rel || ''}`;
        function toggleKeys(keys, on) {
            keys.forEach(k => { if (on) selected.add(k); else selected.delete(k); });
            updateBackupButton();
            updateCommitButton();
        }

        function nodeKeysForExperiment(exp) {
            // Whole-node selection for every repetition + the aggregate, if any.
            const keys = (exp.repetitions || []).map(r => selKey(r.node_id, ''));
            if (exp.aggregate) keys.push(selKey(exp.aggregate.node_id, ''));
            return keys;
        }

        function collectSelections() {
            // node_id contains no spaces; rel_path may, so split on the first only.
            return [...selected].map(k => {
                const sp = k.indexOf(' ');
                return {node_id: k.slice(0, sp), rel_path: k.slice(sp + 1)};
            });
        }

        document.getElementById('search').addEventListener('input', applyFilter);
        if (STATIC) {
            document.getElementById('backup-btn').style.display = 'none';
            document.getElementById('commit-btn').style.display = 'none';
        } else {
            document.getElementById('backup-btn').addEventListener('click', startBackupFlow);
            document.getElementById('commit-btn').addEventListener('click', startCommitFlow);
            updateBackupButton();
            updateCommitButton();
        }

        loadAll();

        async function loadAll() {
            let tree;
            if (STATIC) {
                const data = window.SDGL_DATA || {};
                tree = data.tree || {experiments: []};
            } else {
                tree = await fetch(`${API}/tree`).then(r => r.json());
            }
            treeData = tree;
            renderTree();
        }

        // ---- Tree rendering -------------------------------------------------

        function renderTree() {
            const host = document.getElementById('tree');
            host.innerHTML = '';
            if (!treeData.experiments.length) {
                host.innerHTML = '<p class="empty">No experiments yet.</p>';
                return;
            }
            treeData.experiments.forEach((exp, index) => {
                host.appendChild(experimentBlock(exp, index));
            });
            applyFilter();
        }

        function makeRow({twisty, color, icon, label, meta, badge, badgeClass, check}) {
            const row = document.createElement('div');
            row.className = 'row';
            if (!STATIC && check && check.keys && check.keys.length) {
                const box = document.createElement('input');
                box.type = 'checkbox';
                box.className = 'sel-box';
                box.checked = check.keys.every(k => selected.has(k));
                box.addEventListener('click', (e) => e.stopPropagation());
                box.addEventListener('change', () => toggleKeys(check.keys, box.checked));
                row.appendChild(box);
            }
            const tw = document.createElement('span');
            tw.className = 'twisty' + (twisty ? '' : ' spacer');
            tw.textContent = '▶';
            row.appendChild(tw);
            if (color) {
                const dot = document.createElement('span');
                dot.className = 'dot';
                dot.style.background = color;
                row.appendChild(dot);
            }
            if (icon) {
                const ic = document.createElement('span');
                ic.className = 'entry-icon';
                ic.textContent = icon;
                row.appendChild(ic);
            }
            const lab = document.createElement('span');
            lab.className = 'row-label';
            lab.innerHTML = label + (meta ? ` <span class="row-meta">${meta}</span>` : '');
            row.appendChild(lab);
            if (badge != null) {
                const b = document.createElement('span');
                b.className = 'badge' + (badgeClass ? ' ' + badgeClass : '');
                b.textContent = badge;
                row.appendChild(b);
            }
            return row;
        }

        // Wire a row + its lazily-built children container into a collapsible block.
        function collapsible(row, buildChildren) {
            const wrap = document.createElement('div');
            const children = document.createElement('div');
            children.className = 'children hidden';
            let built = false;
            row.addEventListener('click', (event) => {
                event.stopPropagation();
                const opening = children.classList.contains('hidden');
                if (opening && !built) { buildChildren(children); built = true; }
                children.classList.toggle('hidden');
                row.classList.toggle('open', opening);
            });
            wrap.appendChild(row);
            wrap.appendChild(children);
            return wrap;
        }

        function experimentBlock(exp, index) {
            const tags = (exp.tags || []).map(t => `<span class="tag-chip">${escapeHtml(t)}</span>`).join('');
            const label = `<span class="row-id">${escapeHtml(exp.code || '')}</span> ${escapeHtml(exp.title || '(untitled)')}${tags}`;
            const row = makeRow({
                twisty: true, color: TYPE_COLORS.experiment, label,
                badge: `${exp.repetition_count} rep${exp.repetition_count === 1 ? '' : 's'}`,
                check: {keys: nodeKeysForExperiment(exp)},
            });
            row.dataset.search = `${exp.code} ${exp.title} ${(exp.tags || []).join(' ')}`.toLowerCase();
            row.addEventListener('click', () => select(`exp:${index}`, row, () => detailExperiment(exp)), true);
            const block = collapsible(row, (container) => {
                // Series-level progress reports hang off the parent, once —
                // not duplicated under each repetition.
                (exp.reports || []).forEach((link, i) => container.appendChild(linkRow(link, `${index}.r${i}`)));
                if (exp.aggregate) {
                    container.appendChild(aggregateBlock(exp, exp.aggregate, `${index}.agg`));
                }
                exp.repetitions.forEach((rep, repIndex) => {
                    container.appendChild(repetitionBlock(exp, rep, `${index}.${repIndex}`));
                });
            });
            block.dataset.expRow = '1';
            return block;
        }

        function aggregateBlock(exp, aggregate, key) {
            const meta = aggregate.oldest_mtime ? `oldest ${formatMtime(aggregate.oldest_mtime)}` : '';
            const fileCount = countFiles(aggregate.files);
            const row = makeRow({
                twisty: true, color: TYPE_COLORS.aggregate_analysis || TYPE_COLORS.experiment,
                label: `<span class="row-id">Aggregate</span> <span class="muted">full experiment</span>`,
                meta, badge: fileCount ? `${fileCount} item${fileCount === 1 ? '' : 's'}` : null,
                badgeClass: 'muted',
                check: {keys: [selKey(aggregate.node_id, '')]},
            });
            return collapsible(row, (container) => {
                if (!aggregate.files.length && !(aggregate.links || []).length) {
                    const none = document.createElement('div');
                    none.className = 'row-meta';
                    none.style.padding = '0.35rem 0.6rem';
                    none.textContent = 'No scanned data or linked entities yet.';
                    container.appendChild(none);
                }
                aggregate.files.forEach((entry, i) => container.appendChild(fileNode(entry, `${key}.f${i}`, aggregate.node_id)));
                (aggregate.links || []).forEach((link, i) => container.appendChild(linkRow(link, `${key}.l${i}`)));
            });
        }

        function repetitionBlock(exp, rep, key) {
            const meta = rep.date || '';
            const fileCount = countFiles(rep.files);
            const row = makeRow({
                twisty: true, color: TYPE_COLORS.experiment,
                label: `<span class="row-id">${escapeHtml(rep.id)}</span>`,
                meta, badge: fileCount ? `${fileCount} item${fileCount === 1 ? '' : 's'}` : null,
                badgeClass: 'muted',
                check: {keys: [selKey(rep.node_id, '')]},
            });
            row.addEventListener('click', () => select(`rep:${key}`, row, () => detailRepetition(exp, rep)), true);
            const artifacts = rep.artifacts || [];
            return collapsible(row, (container) => {
                if (!rep.files.length && !rep.links.length && !artifacts.length) {
                    const none = document.createElement('div');
                    none.className = 'row-meta';
                    none.style.padding = '0.35rem 0.6rem';
                    none.textContent = 'No scanned data or linked entities yet.';
                    container.appendChild(none);
                }
                rep.files.forEach((entry, i) => container.appendChild(fileNode(entry, `${key}.f${i}`, rep.node_id)));
                // Committed (stamped) artifacts render distinctly, above plain links.
                artifacts.forEach((art, i) => container.appendChild(artifactRow(art, `${key}.a${i}`)));
                rep.links.forEach((link, i) => container.appendChild(linkRow(link, `${key}.l${i}`)));
            });
        }

        function artifactRow(artifact, key) {
            const kind = artifact.kind || 'derived';
            const row = makeRow({
                twisty: false, color: TYPE_COLORS.dataset, icon: '🔏',
                label: escapeHtml(artifact.name),
                meta: 'committed artifact',
                badge: kind, badgeClass: kind === 'curated' ? 'curated' : 'derived',
            });
            row.classList.add('artifact');
            row.addEventListener('click', () => select(`art:${key}`, row, () => detailArtifact(artifact)), true);
            return wrapLeaf(row);
        }

        function fileNode(entry, key, nodeId) {
            const icon = entry.is_dir ? '📁' : '📄';
            let badge = null, badgeClass = '';
            if (entry.stale_count) { badge = `${entry.stale_count} stale`; badgeClass = 'warn'; }
            else if ((entry.locations || []).length > 1) { badge = `${entry.locations.length}×`; badgeClass = 'muted'; }
            const meta = entry.is_dir ? '' : formatBytes(entry.size);
            const row = makeRow({
                twisty: entry.is_dir, icon, label: escapeHtml(entry.name),
                meta, badge, badgeClass,
                check: {keys: [selKey(nodeId, entry.rel_path)]},
            });
            row.addEventListener('click', () => select(`file:${key}`, row, () => detailFile(entry)), true);
            if (!entry.is_dir) return wrapLeaf(row);
            const block = collapsible(row, (container) => {
                (entry.children || []).forEach((child, i) => container.appendChild(fileNode(child, `${key}.${i}`, nodeId)));
            });
            // raw/ subtrees stay collapsed by default (assumed immutable bulk data).
            return block;
        }

        function linkRow(link, key) {
            // Reports get special treatment - show with document icon and direct link
            if (link.type === 'report') {
                // The report hangs directly under its series, whose title it would
                // just repeat — label it generically ("Report") instead.
                const row = makeRow({
                    twisty: false, color: '#2b7a5f', icon: '📄',
                    label: 'Report'
                });
                // Click opens the report in reports.html. The fragment must be
                // the filename slug (reports.html anchors are `report-<slug>`),
                // not the numeric DB id embedded in node_id.
                row.addEventListener('click', () => {
                    const frag = link.slug || (link.node_id || '').split(':', 2)[1];
                    window.open(`reports.html#${frag}`, '_blank');
                }, true);
                return wrapLeaf(row);
            }
            
            // Default link handling for protocols, presentations, etc.
            const row = makeRow({
                twisty: false, color: TYPE_COLORS[link.type] || '#6b7780', icon: '🔗',
                label: `${escapeHtml(link.title || link.node_id)}`,
                meta: `${link.type} · ${link.relation}`
            });
            row.addEventListener('click', () => select(`link:${key}`, row, () => detailLink(link)), true);
            return wrapLeaf(row);
        }

        function wrapLeaf(row) {
            const wrap = document.createElement('div');
            wrap.appendChild(row);
            return wrap;
        }

        function countFiles(entries) {
            let total = 0;
            (entries || []).forEach(entry => {
                total += 1;
                if (entry.children) total += countFiles(entry.children);
            });
            return total;
        }

        // ---- Selection + detail --------------------------------------------

        function select(key, row, render) {
            selectedKey = key;
            document.querySelectorAll('.row.selected').forEach(r => r.classList.remove('selected'));
            row.classList.add('selected');
            render();
        }

        function detailExperiment(exp) {
            // Experiment group level - show summary and list repetitions
            const tags = (exp.tags || []).map(t => `<span class="tag-chip">${escapeHtml(t)}</span>`).join('') || '<span class="muted">None</span>';
            const repList = (exp.repetitions || []).map(rep => {
                const repTags = (rep.tags || []).map(t => `<span class="tag-chip">${escapeHtml(t)}</span>`).join('') || '<span class="muted">None</span>';
                const channels = (rep.channels || []);
                const channelsList = channels.length > 0
                    ? channels.map(ch => {
                        const parts = [];
                        if (ch.channel_label) parts.push(escapeHtml(ch.channel_label));
                        if (ch.target) parts.push(escapeHtml(ch.target));
                        if (ch.modality) parts.push(escapeHtml(ch.modality));
                        return parts.join(': ');
                    }).join(', ')
                    : '<span class="muted">None</span>';
                
                return `
                    <div class="list-item">
                        <div><strong>${escapeHtml(rep.id)}</strong></div>
                        <div class="muted">Date: ${escapeHtml(rep.date || '—')}</div>
                        <div class="muted">Items: ${countFiles(rep.files || [])}</div>
                        <div style="margin-top: 0.4rem;"><strong>Tags:</strong> ${repTags}</div>
                        <div><strong>Channels:</strong> ${channelsList}</div>
                        ${rep.cell_types ? `<div><strong>Cell types:</strong> ${escapeHtml(rep.cell_types)}</div>` : ''}
                        ${rep.microscope ? `<div><strong>Microscope:</strong> ${escapeHtml(rep.microscope)}</div>` : ''}
                        ${rep.live_or_fixed ? `<div><strong>Live/Fixed:</strong> ${escapeHtml(rep.live_or_fixed)}</div>` : ''}
                        ${rep.comments ? `<div><strong>Comments:</strong> ${escapeHtml(rep.comments)}</div>` : ''}
                    </div>
                `;
            }).join('');
            
            setDetail(`
                <h2>${escapeHtml(exp.title || '(untitled)')}</h2>
                <p><span class="type-pill">experiment</span></p>
                <div class="detail-section">
                    <h3>Summary</h3>
                    <dl class="kv">
                        <dt>Code</dt><dd class="row-id">${escapeHtml(exp.code || '')}</dd>
                        <dt>Repetitions</dt><dd>${exp.repetition_count}</dd>
                        <dt>All Tags</dt><dd>${tags}</dd>
                    </dl>
                </div>
                <div class="detail-section">
                    <h3>Repetitions (with qualifiers)</h3>
                    <div class="list">${repList || '<p class="muted">No repetitions</p>'}</div>
                </div>
            `);
        }

        function detailRepetition(exp, rep) {
            const links = rep.links.map(l => `<div class="list-item">${linkHtml(l)}</div>`).join('');
            setDetail(`
                <h2><span class="row-id">${escapeHtml(rep.id)}</span></h2>
                <p>${escapeHtml(exp.title || '')}</p>
                <div class="detail-section"><dl class="kv">
                    <dt>Date</dt><dd>${escapeHtml(rep.date || '—')}</dd>
                    <dt>Items</dt><dd>${countFiles(rep.files)}</dd>
                </dl></div>
                <div class="detail-section">
                    <h3>Linked entities</h3>
                    <div class="list">${links || '<p class="muted">None</p>'}</div>
                </div>
            `);
        }

        function detailFile(entry) {
            const locations = (entry.locations || []).map(loc => `
                <div class="list-item${loc.stale ? ' stale' : ''}">
                    <div><strong>${escapeHtml(loc.root_name || 'local')}</strong>${loc.stale ? ' <span class="badge warn">stale</span>' : ''}</div>
                    <div class="muted">${escapeHtml(loc.path)}</div>
                    <div class="muted">${formatBytes(loc.size)} · ${loc.mtime ? formatMtime(loc.mtime) : '—'}</div>
                    ${(!STATIC && loc.id) ? `<button data-open="${escapeHtml(loc.id)}">Open</button>` : ''}
                </div>
            `).join('');
            setDetail(`
                <h2>${escapeHtml(entry.name)}</h2>
                <p><span class="type-pill">${entry.is_dir ? 'folder' : 'file'}</span>${entry.in_raw ? ' <span class="badge muted">raw</span>' : ''}</p>
                <div class="detail-section"><dl class="kv">
                    <dt>Path</dt><dd>${escapeHtml(entry.rel_path || entry.name)}</dd>
                    ${entry.is_dir ? '' : `<dt>Size</dt><dd>${formatBytes(entry.size)}</dd>`}
                    <dt>Modified</dt><dd>${entry.mtime ? formatMtime(entry.mtime) : '—'}</dd>
                </dl></div>
                <div class="detail-section">
                    <h3>Locations (${(entry.locations || []).length})</h3>
                    <div class="list">${locations || '<p class="muted">None</p>'}</div>
                </div>
            `);
            document.querySelectorAll('button[data-open]').forEach(btn => {
                btn.addEventListener('click', () => openLocation(btn.dataset.open));
            });
        }

        function detailLink(link) {
            setDetail(`
                <h2>${escapeHtml(link.title || link.node_id)}</h2>
                <p><span class="type-pill">${escapeHtml(link.type)}</span></p>
                <div class="detail-section"><dl class="kv">
                    <dt>Relation</dt><dd>${escapeHtml(link.relation)}</dd>
                    <dt>Node</dt><dd>${escapeHtml(link.node_id)}</dd>
                </dl></div>
                <div class="detail-section">${linkHtml(link)}</div>
            `);
        }

        function detailArtifact(artifact) {
            // A committed (stamped) artifact: show its provenance recipe — the
            // references SDGL recorded at stamp time (never the source itself).
            const r = artifact.record || {};
            const kind = artifact.kind || r.kind || 'derived';
            let recipe = '';
            if (kind === 'derived') {
                const lib = r.library || {}, nb = r.notebook || {};
                const params = r.params || {}, inputs = r.inputs || {};
                const paramRows = Object.keys(params).length
                    ? Object.entries(params).map(([k, v]) =>
                        `<dt>${escapeHtml(k)}</dt><dd>${escapeHtml(JSON.stringify(v))}</dd>`).join('')
                    : '<dt class="muted">none</dt><dd></dd>';
                const inputRows = Object.keys(inputs).length
                    ? Object.entries(inputs).map(([p, h]) =>
                        `<div class="list-item"><div>${escapeHtml(p)}</div><div class="muted">${escapeHtml(h)}</div></div>`).join('')
                    : '<p class="muted">none</p>';
                recipe = `
                    <div class="detail-section"><h3>Recipe (derived)</h3><dl class="kv">
                        <dt>Function</dt><dd>${escapeHtml(lib.function || '—')}</dd>
                        <dt>Library commit</dt><dd>${escapeHtml(lib.commit || '—')}${lib.dirty ? ' <span class="badge warn">dirty</span>' : ''}</dd>
                        <dt>Notebook</dt><dd>${escapeHtml(nb.path || '—')}</dd>
                        <dt>Data commit</dt><dd>${escapeHtml(nb.commit || '—')}${nb.dirty ? ' <span class="badge warn">dirty</span>' : ''}</dd>
                    </dl></div>
                    <div class="detail-section"><h3>Parameters</h3><dl class="kv">${paramRows}</dl></div>
                    <div class="detail-section"><h3>Inputs (${Object.keys(inputs).length})</h3><div class="list">${inputRows}</div></div>
                `;
            } else {
                const nb = r.notebook || {};
                recipe = `
                    <div class="detail-section"><h3>Recipe (curated)</h3><dl class="kv">
                        <dt>Tool</dt><dd>${escapeHtml(r.tool || '—')}</dd>
                        <dt>Method</dt><dd>${escapeHtml(r.method || '—')}</dd>
                        <dt>Data commit</dt><dd>${escapeHtml(nb.commit || '—')}${nb.dirty ? ' <span class="badge warn">dirty</span>' : ''}</dd>
                    </dl></div>
                `;
            }
            setDetail(`
                <h2>${escapeHtml(artifact.name)}</h2>
                <p><span class="type-pill">committed artifact</span>
                   <span class="badge ${kind === 'curated' ? 'curated' : 'derived'}">${escapeHtml(kind)}</span></p>
                <div class="detail-section"><dl class="kv">
                    <dt>Path</dt><dd>${escapeHtml(artifact.rel_path || '—')}</dd>
                    <dt>Content hash</dt><dd>${escapeHtml(r.content_hash || '—')}</dd>
                    <dt>Stamped</dt><dd>${escapeHtml(r.stamped_at || '—')}</dd>
                </dl></div>
                ${recipe}
            `);
        }

        function linkHtml(link) {
            const href = catalogHref(link);
            const label = escapeHtml(link.title || link.node_id);
            const inner = href ? `<a class="xlink" href="${href}">${label}</a>` : label;
            return `<div><strong>${inner}</strong></div><div class="muted">${escapeHtml(link.type)} · ${escapeHtml(link.relation)}</div>`;
        }

        function catalogHref(link) {
            const id = (link.node_id || '').split(':', 2)[1];
            if (link.type === 'protocol') return `protocols.html#${id}`;
            if (link.type === 'report') return link.slug ? `reports.html#${link.slug}` : 'reports.html';
            if (link.type === 'presentation') return 'presentations.html';
            return null;
        }

        function setDetail(html) { document.getElementById('detail').innerHTML = html; }
        function showStatus(message) { setDetail(`<p class="status">${escapeHtml(message)}</p>`); }

        async function openLocation(locationId) {
            await fetch(`${API}/open`, {
                method: 'POST', headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({location_id: locationId})
            });
        }

        // ---- Commit (stamp provenance) --------------------------------------

        function updateCommitButton() {
            const btn = document.getElementById('commit-btn');
            btn.textContent = `Commit… (${selected.size})`;
            btn.disabled = selected.size === 0;
        }

        function startCommitFlow() {
            const selections = collectSelections();
            if (!selections.length) return;
            // Curated (default): copied into the data repo and versioned like code.
            // Derived: recorded by reference (the recipe lives in the producing code).
            setDetail(`
                <div class="backup-panel">
                    <h2>Commit ${selections.length} selected file(s)</h2>
                    <div class="row">
                        <label>Kind
                            <select id="commit-kind">
                                <option value="curated" selected>curated — copy into the repo, version like code</option>
                                <option value="derived">derived — record by reference only</option>
                            </select>
                        </label>
                    </div>
                    <div id="commit-curated">
                        <div class="row"><label>Tool <input id="commit-tool" type="text" placeholder="e.g. napari, Illustrator"></label></div>
                        <div class="row"><label>Method <input id="commit-method" type="text" placeholder="e.g. manual segmentation"></label></div>
                    </div>
                    <div id="commit-derived" class="hidden">
                        <div class="row"><label>Function <input id="commit-function" type="text" placeholder="dotted name, e.g. mylib.tfm.compute"></label></div>
                    </div>
                    <div class="row warn">Curated files are copied into <code>curated/&lt;EXPERIMENT-ID&gt;/…</code> in the data repo and committed on publish.</div>
                    <div class="row"><button id="commit-go">Commit</button></div>
                    <div class="row" id="commit-result"></div>
                </div>
            `);
            const kindSel = document.getElementById('commit-kind');
            const sync = () => {
                const curated = kindSel.value === 'curated';
                document.getElementById('commit-curated').classList.toggle('hidden', !curated);
                document.getElementById('commit-derived').classList.toggle('hidden', curated);
            };
            kindSel.addEventListener('change', sync);
            sync();
            document.getElementById('commit-go').addEventListener('click', () => runCommit(selections));
        }

        async function runCommit(selections) {
            const kind = document.getElementById('commit-kind').value;
            const body = {selections, kind};
            if (kind === 'curated') {
                body.tool = document.getElementById('commit-tool').value.trim();
                body.method = document.getElementById('commit-method').value.trim();
                if (!body.tool || !body.method) {
                    document.getElementById('commit-result').innerHTML =
                        '<span class="warn">Curated commits need both a tool and a method.</span>';
                    return;
                }
            } else {
                body.function = document.getElementById('commit-function').value.trim() || null;
            }
            const out = document.getElementById('commit-result');
            out.textContent = 'Committing…';
            const resp = await fetch(`${API}/provenance/stamp`, {
                method: 'POST', headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(body),
            }).then(r => r.json()).catch(err => ({error: String(err)}));
            if (resp.error && !resp.count) {
                out.innerHTML = `<span class="warn">Error: ${escapeHtml(resp.error)}</span>`;
                return;
            }
            let msg = `Committed ${resp.count} artifact(s).`;
            if ((resp.errors || []).length) msg += ` ${resp.errors.length} skipped.`;
            out.textContent = msg;
            // Clear the selection and refresh so the newly committed artifacts render.
            selected.clear();
            updateBackupButton();
            updateCommitButton();
            await loadAll();
        }

        // ---- Backup ---------------------------------------------------------

        function updateBackupButton() {
            const btn = document.getElementById('backup-btn');
            btn.textContent = `Backup… (${selected.size})`;
            btn.disabled = selected.size === 0;
        }

        let backupDest = null;

        async function chooseDestination() {
            const resp = await fetch(`${API}/backup/choose-folder`, {method: 'POST'})
                .then(r => r.json()).catch(() => ({}));
            if (resp && resp.path) return resp.path;
            // Fallback: typed path (dialog cancelled or unavailable).
            return prompt('Backup destination folder (absolute path):') || null;
        }

        async function startBackupFlow() {
            const selections = collectSelections();
            if (!selections.length) return;
            const preview = await fetch(`${API}/backup/preview`, {
                method: 'POST', headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({selections}),
            }).then(r => r.json());
            renderPreview(preview, selections);
        }

        function renderPreview(preview, selections) {
            const mb = (preview.total_size / (1024 * 1024)).toFixed(1);
            let html = `<div class="backup-panel"><h2>Backup preview</h2>`;
            html += `<div class="row"><strong>${preview.file_count}</strong> files · <strong>${mb} MB</strong></div>`;
            if (preview.missing.length) {
                html += `<div class="row warn">${preview.missing.length} recorded file(s) missing on disk — will be skipped.</div>`;
            }
            const resolutions = {};
            if (preview.conflicts.length) {
                html += `<div class="row warn">${preview.conflicts.length} conflict(s): pick a copy for each.</div>`;
                preview.conflicts.forEach((c, i) => {
                    html += `<div class="row"><div class="muted">${escapeHtml(c.rel_path)}</div>`;
                    c.copies.forEach((copy, j) => {
                        const id = `conf-${i}-${j}`;
                        html += `<label><input type="radio" name="conf-${i}" value="${escapeHtml(copy.location_id)}" ${j === 0 ? 'checked' : ''}> ${escapeHtml(copy.root_name || 'local')} · ${formatBytes(copy.size)} · ${escapeHtml(copy.path)}</label><br>`;
                    });
                    html += `</div>`;
                    resolutions[`${c.node_id}\n${c.rel_path}`] = c.copies[0].location_id;
                });
            }
            html += `<div class="row"><button id="backup-go">Choose destination & copy</button></div></div>`;
            setDetail(html);
            document.getElementById('backup-go').addEventListener('click', async () => {
                preview.conflicts.forEach((c, i) => {
                    const picked = document.querySelector(`input[name="conf-${i}"]:checked`);
                    if (picked) resolutions[`${c.node_id}\n${c.rel_path}`] = picked.value;
                });
                const dest = await chooseDestination();
                if (!dest) return;
                await fetch(`${API}/backup/start`, {
                    method: 'POST', headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({selections, dest, resolutions}),
                });
                pollBackupStatus();
            });
        }

        async function pollBackupStatus() {
            const status = await fetch(`${API}/backup/status`).then(r => r.json());
            if (status.status === 'running') {
                const total = status.total_files || 0;
                const done = status.done_files || 0;
                setDetail(`<div class="backup-panel"><h2>Backing up…</h2>
                    <div class="row">${done} / ${total} files</div>
                    <progress max="${total}" value="${done}"></progress>
                    <div class="muted">${escapeHtml(status.current || '')}</div></div>`);
                setTimeout(pollBackupStatus, 500);
            } else if (status.status === 'done') {
                const s = status.summary || {};
                setDetail(`<div class="backup-panel"><h2>Backup complete</h2>
                    <div class="row">Copied <strong>${s.copied}</strong> files to ${escapeHtml(s.dest || '')}</div>
                    <div class="row muted">${(s.skipped || []).length} skipped · ${(s.errors || []).length} errors</div></div>`);
            } else if (status.status === 'error') {
                setDetail(`<div class="backup-panel warn"><h2>Backup failed</h2><div>${escapeHtml(status.error || '')}</div></div>`);
            }
        }

        // ---- Search ---------------------------------------------------------

        function applyFilter() {
            const query = document.getElementById('search').value.trim().toLowerCase();
            document.querySelectorAll('#tree > div[data-exp-row]').forEach(block => {
                const row = block.querySelector('.row');
                const hit = !query || (row.dataset.search || '').includes(query);
                row.classList.toggle('dimmed', !hit);
            });
        }

        // ---- Formatting -----------------------------------------------------

        function formatBytes(bytes) {
            if (bytes == null) return '—';
            if (bytes < 1024) return `${bytes} B`;
            const units = ['KB', 'MB', 'GB', 'TB'];
            let value = bytes / 1024, i = 0;
            while (value >= 1024 && i < units.length - 1) { value /= 1024; i++; }
            return `${value.toFixed(value < 10 ? 1 : 0)} ${units[i]}`;
        }

        function formatMtime(mtime) {
            if (!mtime) return '—';
            const date = new Date(mtime * 1000);
            if (isNaN(date)) return '—';
            return date.toISOString().slice(0, 10);
        }

        function escapeHtml(value) {
            return String(value ?? '').replace(/[&<>"']/g, char => ({
                '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
            }[char]));
        }
    </script>
</body>
</html>
